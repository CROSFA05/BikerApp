{% extends 'base.html' %}

{% block title %}Sesión Cerrada - Biker App{% endblock %}

{% block content %}
<style>
  .logout-container {
    max-width: 400px;
    margin: 4rem auto;
    padding: 2rem;
    background: linear-gradient(145deg, var(--neu-bg-primary), var(--neu-bg-secondary));
    border-radius: 2rem;
    box-shadow: 8px 8px 16px var(--neu-shadow-dark), -8px -8px 16px var(--neu-shadow-light);
    text-align: center;
  }

  .btn-primary {
    display: inline-block;
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--neu-primary), var(--neu-primary-dark));
    color: white;
    text-decoration: none;
    border-radius: 0.5rem;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 4px 4px 8px var(--neu-shadow-dark), -4px -4px 8px var(--neu-shadow-light);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 6px 6px 12px var(--neu-shadow-dark), -6px -6px 12px var(--neu-shadow-light);
  }

  @media (max-width: 640px) {
    .logout-container { margin: 2rem auto; padding: 1.5rem; max-width: 90%; }
    .logout-container h1 { font-size: 1.5rem; }
  }

  @media (max-width: 480px) {
    .logout-container { margin: 1rem auto; padding: 1.25rem; }
    .btn-primary { width: 100%; text-align: center; }
  }
</style>

<div class="logout-container">
  <h1 class="text-2xl font-bold mb-4">Sesión Cerrada</h1>
  <p class="mb-6">Has cerrado sesión exitosamente.</p>
  <a href="{% url 'login' %}" class="btn-primary">Iniciar Sesión de Nuevo</a>
</div>
{% endblock %}
