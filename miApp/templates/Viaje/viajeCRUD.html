{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<style>
  .form-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  .form-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .form-header h1 {
    font-size: 2rem;
    font-weight: 600;
    color: #111827;
  }

  .form-section {
    background: linear-gradient(145deg, var(--neu-bg-primary), var(--neu-bg-secondary));
    padding: 2rem;
    border-radius: 1.5rem;
    box-shadow: 8px 8px 16px var(--neu-shadow-dark), -8px -8px 16px var(--neu-shadow-light);
  }

  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #7c3aed;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-group label {
    display: block;
    font-weight: 500;
    color: #374151;
    margin-bottom: 0.5rem;
  }

  .form-group input, .form-group select {
    width: 100%;
    padding: 0.75rem 1rem;
    border: none;
    border-radius: 0.75rem;
    background: linear-gradient(145deg, var(--neu-bg-secondary), var(--neu-bg-primary));
    box-shadow: inset 4px 4px 8px var(--neu-shadow-dark), inset -4px -4px 8px var(--neu-shadow-light);
    color: inherit;
  }

  .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
  }

  .form-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(124, 58, 237, 0.1);
  }

  .btn-secondary, .btn-success {
    padding: 0.75rem 1.5rem;
    border-radius: 0.75rem;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
  }

  .btn-secondary {
    background: linear-gradient(145deg, var(--neu-bg-primary), var(--neu-bg-secondary));
    box-shadow: 8px 8px 16px var(--neu-shadow-dark), -8px -8px 16px var(--neu-shadow-light);
    color: #374151;
  }

  .btn-success {
    background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
    color: white;
    box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
  }
</style>

<div class="form-container">
    <div class="form-header">
        <h1>{{ titulo }}</h1>
    </div>

    <div class="form-section">
        <form method="post">
            {% csrf_token %}
            
            <div class="section-title">
                <span class="iconify" data-icon="lucide:map-pin" data-width="20"></span>
                Detalles de la Ruta
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="id_usuario">Usuario <span class="text-red-500">*</span></label>
                    {{ form.usuario }}
                </div>
                <div class="form-group">
                    <label for="id_estado">Estado <span class="text-red-500">*</span></label>
                    {{ form.estado }}
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="id_lugar_de_inicio">Lugar de Inicio <span class="text-red-500">*</span></label>
                    <input type="text" name="lugar_de_inicio" id="id_lugar_de_inicio" value="{{ form.lugar_de_inicio.value|default:'' }}" required maxlength="200">
                </div>
                <div class="form-group">
                    <label for="id_lugar_de_fin">Lugar de Destino</label>
                    <input type="text" name="lugar_de_fin" id="id_lugar_de_fin" value="{{ form.lugar_de_fin.value|default:'' }}" maxlength="200">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="id_distancia_estimada">Distancia (km)</label>
                    <input type="number" name="distancia_estimada" id="id_distancia_estimada" value="{{ form.distancia_estimada.value|default:'' }}" step="0.01">
                </div>
                <div class="form-group">
                    <label for="id_duracion_estimada">Duración (horas)</label>
                    <input type="number" name="duracion_estimada" id="id_duracion_estimada" value="{{ form.duracion_estimada.value|default:'' }}" step="0.01">
                </div>
            </div>

            <div class="form-actions">
                <a href="{% url 'viajes' %}" class="btn-secondary">Cancelar</a>
                <button type="submit" class="btn-success">
                    <span class="iconify" data-icon="lucide:save" data-width="18"></span>
                    {% if modo == 'editar' %}Actualizar Viaje{% else %}Crear Viaje{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>

<script>
  if (window.Iconify) { Iconify.build(); }
</script>
{% endblock %}
