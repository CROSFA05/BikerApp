{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{{ titulo }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_nombre" class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" id="id_nombre"
                            value="{{ form.nombre.value|default:'' }}" required maxlength="50">
                        {% if form.nombre.errors %}
                        <div class="text-danger small">{{ form.nombre.errors }}</div>
                        {% endif %}
                    </div>
                    <div class="mb-3">
                        <label for="id_descripcion" class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" id="id_descripcion" rows="4" required
                            maxlength="300">{{ form.descripcion.value|default:'' }}</textarea>
                        {% if form.descripcion.errors %}
                        <div class="text-danger small">{{ form.descripcion.errors }}</div>
                        {% endif %}
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="activo" class="form-check-input" id="id_activo" {% if form.activo.value %}checked{% endif %}>
                        <label class="form-check-label" for="id_activo">Activo</label>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'grupos' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">
                            {% if modo == 'editar' %}Actualizar{% else %}Crear{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
