{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<style>
  .form-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  .form-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .form-header h1 {
    font-size: 2rem;
    font-weight: 600;
    color: #111827;
  }

  .form-section {
    background: linear-gradient(145deg, var(--neu-bg-primary), var(--neu-bg-secondary));
    padding: 2rem;
    border-radius: 1.5rem;
    box-shadow: 8px 8px 16px var(--neu-shadow-dark), -8px -8px 16px var(--neu-shadow-light);
  }

  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #8b5e3c;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }
       
  
  .form-group label {
    display: block;
    font-weight: 500;
    color: #ffffff;
    color: #374151;
    margin-bottom: 0.5rem;
  }

  .dark .form-group label {
    color: #e5e7eb;
  }

  .form-group input, .form-group select {
    width: 100%;
    padding: 0.75rem 1rem;
    border: none;
    border-radius: 0.75rem;
    font-size: 0.95rem;
    transition: all 0.3s;
    background: linear-gradient(145deg, var(--neu-bg-secondary), var(--neu-bg-primary));
    box-shadow: inset 4px 4px 8px var(--neu-shadow-dark), inset -4px -4px 8px var(--neu-shadow-light);
    color: inherit;
  }

  .form-group input:focus, .form-group select:focus {
    outline: none;
    ring: 2px solid #8b5e3c;
    box-shadow: inset 4px 4px 8px var(--neu-shadow-dark), inset -4px -4px 8px var(--neu-shadow-light), 0 0 0 3px rgba(139, 94, 60, 0.1);
  }

  .form-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(139, 94, 60, 0.1);
  }

  .btn-secondary, .btn-success {
    padding: 0.75rem 1.5rem;
    border-radius: 0.75rem;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn-secondary {
    background: linear-gradient(145deg, var(--neu-bg-primary), var(--neu-bg-secondary));
    box-shadow: 8px 8px 16px var(--neu-shadow-dark), -8px -8px 16px var(--neu-shadow-light);
    color: #374151;
    text-decoration: none;
  }

  .btn-success {
    background: linear-gradient(135deg, #b48b6a 0%, #8b5e3c 100%);
    color: white;
    box-shadow: 0 4px 12px rgba(139, 94, 60, 0.3);
  }
</style>

<div class="form-container">
    <div class="form-header">
        <h1>{{ titulo }}</h1>
    </div>

    <div class="form-section">
        <form method="post">
            {% csrf_token %}
            
            <div class="section-title">
                <span class="iconify" data-icon="lucide:info" data-width="20"></span>
                Detalles del Vehículo
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="id_marca">Marca <span class="text-red-500">*</span></label>
                    <input type="text" name="marca" id="id_marca" value="{{ form.marca.value|default:'' }}" required maxlength="50">
                </div>

                <div class="form-group">
                    <label for="id_modelo">Modelo <span class="text-red-500">*</span></label>
                    <input type="text" name="modelo" id="id_modelo" value="{{ form.modelo.value|default:'' }}" required maxlength="50">
                </div>

                <div class="form-group">
                    <label for="id_año">Año <span class="text-red-500">*</span></label>
                    <input type="number" name="año" id="id_año" value="{{ form.año.value|default:'' }}" required min="1900" max="2100">
                </div>

                <div class="form-group">
                    <label for="id_color">Color <span class="text-red-500">*</span></label>
                    <input type="text" name="color" id="id_color" value="{{ form.color.value|default:'' }}" required maxlength="50">
                </div>

                <div class="form-group">
                    <label for="id_matricula">Matrícula <span class="text-red-500">*</span></label>
                    <input type="text" name="matricula" id="id_matricula" value="{{ form.matricula.value|default:'' }}" required maxlength="15">
                </div>

                <div class="form-group">
                    <label for="id_tipo_vehiculo">Tipo <span class="text-red-500">*</span></label>
                    <select name="tipo_vehiculo" id="id_tipo_vehiculo" required>
                        <option value="">Seleccionar tipo...</option>
                        {% for choice in form.tipo_vehiculo.field.choices %}
                            <option value="{{ choice.0 }}" {% if form.tipo_vehiculo.value == choice.0 %}selected{% endif %}>{{ choice.1 }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem; margin-top: 1rem;">
                <input type="checkbox" name="activo" id="id_activo" style="width: 1.25rem; height: 1.25rem; accent-color: #8b5e3c;" {% if form.activo.value %}checked{% endif %}>
                <label for="id_activo" style="margin: 0; cursor: pointer;">Vehículo Activo</label>
            </div>

            <div class="form-actions">
                <a href="{% url 'vehiculos' %}" class="btn-secondary">Cancelar</a>
                <button type="submit" class="btn-success">
                    {% if modo == 'editar' %}
                        <span class="iconify" data-icon="lucide:save" data-width="18"></span>
                        Actualizar
                    {% else %}
                        <span class="iconify" data-icon="lucide:plus-circle" data-width="18"></span>
                        Crear Vehículo
                    {% endif %}
                </button>
            </div>
        </form>
    </div>
</div>

<script>
  if (window.Iconify) { Iconify.build(); }
</script>
{% endblock %}
