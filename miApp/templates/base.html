<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BikerApp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
        }
        .navbar-dark-custom {
            background-color: #1a3a5c !important;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .navbar-dark-custom .nav-link {
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
        }
        .navbar-dark-custom .navbar-brand {
            font-size: 1.4rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-dark-custom">
        <div class="container">
            <a class="navbar-brand" href="/">BikerApp</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'usuarios' %}">Usuarios</a>
                <a class="nav-link" href="{% url 'contactos' %}">Contactos de Emergencia</a>
                <a class="nav-link" href="{% url 'grupos' %}">Grupos de Bikers</a>
                <a class="nav-link" href="{% url 'vehiculos' %}">Vehiculos</a>
                <a class="nav-link" href="{% url 'viajes' %}">Viajes</a>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
