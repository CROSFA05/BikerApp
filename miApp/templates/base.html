<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BikerApp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f0f4f8;
        }
        .navbar-dark-custom {
            background-color: #1a3a5c !important;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .navbar-dark-custom .nav-link {
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
            position: relative;
            transition: color 0.3s ease;
        }
        .navbar-dark-custom .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background-color: #fff;
            transition: all 0.3s ease;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        .navbar-dark-custom .nav-link:hover::after,
        .navbar-dark-custom .nav-link.active::after {
            width: 80%;
        }
        .navbar-dark-custom .nav-link:hover {
            color: #fff;
        }
        .navbar-dark-custom .navbar-brand {
            font-size: 1.4rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-dark-custom">
        <div class="container">
            <a class="navbar-brand" href="/">BikerApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link {% if request.path == '/usuarios/' or request.path == '/usuarios/alta/' %}active{% endif %}" href="{% url 'usuarios' %}">Usuarios</a>
                    <a class="nav-link {% if request.path == '/contactos/' or request.path == '/contactos/alta/' %}active{% endif %}" href="{% url 'contactos' %}">Contactos de Emergencia</a>
                    <a class="nav-link {% if request.path == '/grupos/' or request.path == '/grupos/alta/' %}active{% endif %}" href="{% url 'grupos' %}">Grupos de Bikers</a>
                    <a class="nav-link {% if request.path == '/vehiculos/' or request.path == '/vehiculos/alta/' %}active{% endif %}" href="{% url 'vehiculos' %}">Vehículos</a>
                    <a class="nav-link {% if request.path == '/viajes/' or request.path == '/viajes/alta/' %}active{% endif %}" href="{% url 'viajes' %}">Viajes</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
